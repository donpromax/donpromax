name: Update README Activity

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Refresh recent activity
        uses: actions/github-script@v9
        env:
          TARGET_FILE: README.md
          HISTORY_FILE: .github/activity-history.json
          HISTORY_DAYS: "365"
          MAX_LINES: "8"
          EXCLUDED_REPOS: ${{ github.repository }},donpromax/donpromax.github.io
          EVENT_TYPES: IssueCommentEvent,IssuesEvent,PullRequestEvent,ReleaseEvent
        with:
          script: |
            await require('./.github/scripts/update-readme-activity.js')({ github, context, core });

      - name: Commit README changes
        run: |
          git add README.md .github/activity-history.json

          if git diff --cached --quiet; then
            echo "README is already up to date"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "chore: update recent activity"
          git push
